apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-site
  template:
    metadata:
      labels:
        app: personal-site
    spec:
      containers:
      - name: site
        image: DOCKER_IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: site-svc
spec:
  selector:
    app: personal-site
  ports:
    - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: daterdum.com
    http:
      paths:
      - path: /site(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: site-svc
            port:
              number: 80